<!-- fina v3 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fina</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#FFFFFF;color:#2C2420;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;}
:root{
  --bg:#FFFFFF;--sf:#FFFFFF;--sf2:#F7F4F1;--sf3:#EDE8E3;
  --bd:rgba(60,40,30,0.10);--bd2:rgba(60,40,30,0.20);
  --rose:#B8728A;--rose-dim:#F5ECF0;--rose-dark:#8C4A62;
  --sage:#5A8A6A;--sage-dim:#EDF4EF;--sage-dark:#3D6142;
  --caramel:#A0784A;--caramel-dim:#F5EDE0;
  --slate:#4A7090;--slate-dim:#EAF0F5;
  --purple:#7A5FA0;--purple-dim:#F0ECF8;
  --tx:#2C2420;--mu:#8A7870;--di:#C4B8B2;
  --fn:'DM Sans',system-ui,sans-serif;--mo:'DM Mono',monospace;
  --r:10px;--r-lg:14px;
}
body{min-height:100vh;}
.shell{max-width:1100px;margin:0 auto;padding:0 20px 60px;}
nav{background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50;}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:48px;gap:12px;}
.logo{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--mu);white-space:nowrap;}
.logo span{color:var(--rose);}
.save-ind{font-size:11px;color:var(--sage-dark);font-family:var(--mo);transition:opacity .3s;opacity:0;}
.save-ind.show{opacity:1;}
.tabs{display:flex;gap:2px;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-size:12px;font-weight:500;color:var(--mu);padding:5px 12px;border-radius:7px;cursor:pointer;border:none;background:none;font-family:var(--fn);white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--tx);background:var(--sf2);}
.tab.active{color:var(--rose-dark);background:var(--rose-dim);}
.export-btn{font-size:11px;color:var(--mu);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;cursor:pointer;background:none;font-family:var(--fn);transition:all .15s;}
.export-btn:hover{color:var(--tx);border-color:var(--bd2);}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);box-shadow:0 1px 4px rgba(44,36,32,0.05);}
.card-head{padding:11px 15px;border-bottom:1px solid var(--bd);background:var(--sf2);border-radius:var(--r-lg) var(--r-lg) 0 0;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.card-title{font-size:12px;font-weight:600;color:var(--tx);}
.section-ey{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);}
.pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;}
.badge-under{background:var(--sage-dim);color:var(--sage-dark);}
.badge-over{background:var(--rose-dim);color:var(--rose-dark);}
.month-nav{display:flex;align-items:center;gap:8px;}
.mbtn{background:var(--sf);border:1px solid var(--bd);color:var(--mu);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.mbtn:hover{border-color:var(--bd2);color:var(--tx);}
.month-lbl{font-size:18px;font-weight:600;color:var(--tx);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;}
.stat-lbl{font-size:10px;color:var(--mu);margin-bottom:3px;}
.stat-val{font-size:18px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums;}
.upload-row{display:grid;gap:10px;margin-bottom:14px;}
.upzone{background:var(--sf);border:1px dashed var(--bd2);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;}
.upzone:hover,.upzone.drag{border-color:var(--rose);background:var(--rose-dim);}
.upzone.parsed{border-style:solid;border-color:var(--sage);background:var(--sage-dim);}
.up-icon{font-size:18px;flex-shrink:0;color:var(--di);}
.upzone.parsed .up-icon{color:var(--sage-dark);}
.up-info{flex:1;min-width:0;}
.up-title{font-size:12px;font-weight:500;color:var(--tx);}
.up-sub{font-size:11px;color:var(--mu);margin-top:1px;}
.upzone.parsed .up-sub{color:var(--sage-dark);}
.up-status{font-size:11px;font-family:var(--mo);margin-top:4px;}
.up-status.loading{color:var(--caramel);}
.up-status.done{color:var(--sage-dark);}
.up-status.error{color:var(--rose-dark);}
.up-action-btn{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--fn);white-space:nowrap;border:none;flex-shrink:0;}
.btn-upload{background:var(--rose);color:#fff;}
.btn-reupload{background:var(--sage-dim);color:var(--sage-dark);border:1px solid var(--sage) !important;}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:none;width:240px;max-width:100%;}
.search-inp{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:7px 10px 7px 32px;font-size:12px;font-family:var(--fn);color:var(--tx);outline:none;transition:border-color .15s;}
.search-inp:focus{border-color:var(--rose);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--di);font-size:14px;pointer-events:none;}
.filter-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.chip-cat{background:var(--rose-dim);color:var(--rose-dark);border:1px solid var(--rose);}
.chip-src{background:var(--slate-dim);color:var(--slate);border:1px solid var(--slate);}
.chip-x{opacity:.6;font-size:14px;line-height:1;cursor:pointer;background:none;border:none;color:inherit;padding:0;}
.chip-x:hover{opacity:1;}
.note-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;}
.note-inp{flex:1;background:none;border:none;font-size:12px;font-family:var(--fn);color:var(--tx);outline:none;resize:none;line-height:1.5;min-height:20px;}
.note-inp::placeholder{color:var(--di);}
.table-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden;}
.table-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--bd);background:var(--sf2);}
.table-hint{font-size:11px;color:var(--mu);}
table.txn{width:100%;border-collapse:collapse;}
table.txn th{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);text-align:left;padding:8px 14px;border-bottom:1px solid var(--bd);cursor:pointer;white-space:nowrap;user-select:none;}
table.txn th:hover{color:var(--tx);}
table.txn th.sorted{color:var(--rose-dark);}
table.txn th:nth-child(4){text-align:right;}
table.txn td{padding:8px 14px;border-bottom:1px solid var(--bd);font-size:12px;vertical-align:middle;}
table.txn tr:last-child td{border-bottom:none;}
table.txn tbody tr:hover td{background:var(--sf2);}
table.txn tbody tr.excluded td{opacity:.35;}
table.txn tbody tr.excluded .merchant-name{text-decoration:line-through;}
.date-cell{color:var(--mu);font-family:var(--mo);font-size:11px;white-space:nowrap;}
.card-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;margin-right:4px;white-space:nowrap;flex-shrink:0;}
.merchant-name{font-weight:500;color:var(--tx);}
.cat-select{background:transparent;border:none;font-size:12px;font-family:var(--fn);color:var(--tx);cursor:pointer;outline:none;padding:2px 4px;border-radius:5px;max-width:140px;}
.cat-select:hover,.cat-select:focus{background:var(--sf2);}
.amt-wrap{text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:4px;}
.amt-val{font-family:var(--mo);font-size:12px;color:var(--tx);cursor:text;border-bottom:1px dashed var(--di);padding-bottom:1px;}
.amt-val:hover{border-color:var(--rose);}
.amt-val.overridden{color:var(--caramel);border-color:var(--caramel);}
.amt-revert{font-size:10px;color:var(--caramel);border-bottom:1px dashed var(--caramel);cursor:pointer;}
.split-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:9px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;border:1px solid var(--bd2);background:var(--sf2);color:var(--mu);}
.split-badge.full{background:var(--sage-dim);color:var(--sage-dark);border-color:var(--sage);}
.excl-btn{font-size:10px;padding:2px 8px;border-radius:5px;border:1px solid var(--bd);background:none;color:var(--mu);cursor:pointer;font-family:var(--fn);transition:all .15s;white-space:nowrap;}
.excl-btn:hover{color:var(--rose-dark);border-color:var(--rose);background:var(--rose-dim);}
.excl-btn.restore{color:var(--sage-dark);border-color:var(--sage);background:var(--sage-dim);}
.empty-state{text-align:center;padding:40px 24px;color:var(--mu);}
.empty-icon{font-size:28px;margin-bottom:10px;}
.empty-title{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:4px;}
.empty-sub{font-size:12px;}
.cc-dining{background:var(--caramel-dim);color:var(--caramel);}
.cc-transport{background:var(--slate-dim);color:var(--slate);}
.cc-shopping{background:var(--purple-dim);color:var(--purple);}
.cc-fitness{background:var(--sage-dim);color:var(--sage-dark);}
.cc-personal{background:var(--rose-dim);color:var(--rose-dark);}
.cc-subs{background:var(--sf2);color:var(--mu);}
.cc-health{background:var(--slate-dim);color:var(--slate);}
.cc-travel{background:var(--sage-dim);color:var(--sage-dark);}
.cc-entertainment{background:var(--caramel-dim);color:var(--caramel);}
.cc-groceries{background:var(--sage-dim);color:var(--sage-dark);}
.cc-other{background:var(--sf2);color:var(--di);}
.greeting-name{font-size:20px;font-weight:600;color:var(--tx);}
.greeting-date{font-size:12px;color:var(--mu);margin-top:2px;}
.hero-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.arc-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px 18px;box-shadow:0 1px 4px rgba(44,36,32,0.05);}
.arc-card-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:10px;}
.arc-row{display:flex;align-items:center;gap:14px;}
.arc-meta{flex:1;}
.arc-main-val{font-size:22px;font-weight:600;color:var(--tx);line-height:1;}
.arc-of{font-size:11px;color:var(--mu);margin-top:3px;}
.arc-sub{font-size:11px;font-weight:500;margin-top:4px;}
.goals-strip{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:12px 16px;margin-bottom:12px;}
.goals-row{display:flex;gap:10px;flex-wrap:wrap;}
.goal-mini{display:flex;align-items:center;gap:8px;flex:1;min-width:130px;}
.gm-name{font-size:11px;font-weight:500;color:var(--tx);}
.gm-prog{font-size:10px;color:var(--mu);margin-top:1px;}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch;}
.budget-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;display:flex;flex-direction:column;}
.donut-legend-row{display:grid;grid-template-columns:100px 1fr;gap:12px;align-items:center;margin-bottom:10px;}
.donut-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.donut-val{font-size:14px;font-weight:600;color:var(--tx);}
.donut-lbl{font-size:9px;color:var(--mu);}
.legend{display:flex;flex-direction:column;gap:5px;}
.li{display:flex;align-items:center;gap:6px;}
.li-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.li-name{font-size:11px;color:var(--tx);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-bar{width:32px;height:3px;background:var(--sf3);border-radius:2px;overflow:hidden;flex-shrink:0;}
.li-fill{height:3px;border-radius:2px;}
.li-pct{font-size:10px;width:22px;text-align:right;flex-shrink:0;}
.divider{height:1px;background:var(--bd);margin:10px 0;}
.movers-lbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--di);margin-bottom:6px;}
.movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.mover{border-radius:8px;padding:8px 10px;}
.mover.over{background:var(--rose-dim);}
.mover.under{background:var(--sage-dim);}
.mover-cat{font-size:11px;font-weight:500;color:var(--tx);}
.mover-amt{font-size:12px;font-weight:600;margin-top:1px;}
.mover-amt.over{color:var(--rose-dark);}
.mover-amt.under{color:var(--sage-dark);}
.budget-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.budget-footer-stat{font-size:10px;color:var(--mu);}
.pva-link{font-size:10px;color:var(--rose-dark);cursor:pointer;}
.chart-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;display:flex;flex-direction:column;}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.range-btns{display:flex;gap:3px;}
.rbtn{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--bd);color:var(--mu);cursor:pointer;font-family:var(--fn);background:none;transition:all .15s;}
.rbtn:hover{border-color:var(--bd2);color:var(--tx);}
.rbtn.active{background:var(--rose-dim);color:var(--rose-dark);border-color:var(--rose);}
.chart-svg-wrap{flex:1;min-height:100px;position:relative;}
.chart-x{display:flex;justify-content:space-between;padding:3px 0 8px;}
.chart-x span{font-size:9px;color:var(--di);}
.chart-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.chart-footer{display:flex;justify-content:flex-end;align-items:center;margin-top:10px;}
.cs{background:var(--sf2);border-radius:6px;padding:7px 9px;}
.cs .lbl{font-size:9px;color:var(--mu);margin-bottom:1px;}
.cs .val{font-size:12px;font-weight:600;color:var(--tx);}
.pva-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;text-align:center;}
.kpi.clickable{cursor:pointer;}
.kpi.clickable:hover{border-color:var(--bd2);}
.kpi-lbl{font-size:10px;color:var(--mu);margin-bottom:3px;}
.kpi-val{font-size:20px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums;}
.pva-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;}
.pva-panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden;}
.pva-panel-head{padding:10px 14px;border-bottom:1px solid var(--bd);border-left:3px solid transparent;background:var(--sf2);display:flex;justify-content:space-between;align-items:center;}
.pva-panel-title{font-size:12px;font-weight:600;color:var(--tx);}
.pva-panel-note{font-size:10px;color:var(--mu);}
.pva-delta{font-size:11px;font-weight:600;}
.pva-delta.under{color:var(--sage-dark);}
.pva-delta.over{color:var(--rose-dark);}
.pva-delta.fixed{color:var(--mu);}
.pva-item{display:flex;align-items:center;gap:6px;padding:5px 12px;border-bottom:1px solid var(--bd);transition:background .1s;}
.pva-item:last-of-type{border-bottom:none;}
.pva-item.clickable{cursor:pointer;}
.pva-item.clickable:hover{background:var(--sf2);}
.pva-name{font-size:11px;color:var(--mu);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;}
.bar-wrap{width:40px;height:3px;background:var(--sf3);border-radius:2px;overflow:hidden;flex-shrink:0;}
.bar-fill{height:3px;border-radius:2px;transition:width .4s;}
.pva-actual{font-size:11px;font-weight:500;width:46px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;}
.pva-bud-inp{background:transparent;border:none;border-bottom:1px dashed var(--di);color:var(--mu);font-size:10px;font-family:var(--mo);width:40px;text-align:right;outline:none;padding:1px 2px;transition:all .15s;}
.pva-bud-inp:focus{border-bottom-color:var(--rose);color:var(--tx);background:var(--sf2);border-radius:3px 3px 0 0;}
.pva-var{font-size:10px;width:44px;text-align:right;flex-shrink:0;font-weight:600;}
.pva-del{background:none;border:none;color:var(--di);cursor:pointer;font-size:11px;padding:1px 4px;border-radius:4px;opacity:0;transition:all .15s;flex-shrink:0;}
.pva-item:hover .pva-del{opacity:1;}
.pva-del:hover{color:var(--rose-dark);background:var(--rose-dim);}
.pva-item[draggable="true"]{cursor:grab;}
.pva-item[draggable="true"]:active{cursor:grabbing;}
.pva-item.drag-over{background:var(--rose-dim)!important;box-shadow:inset 0 2px 0 var(--rose);}
.pva-add-row{display:flex;align-items:center;gap:6px;padding:7px 12px;border-top:1px solid var(--bd);background:var(--sf2);}
.pva-add-inp{flex:1;background:transparent;border:none;border-bottom:1px dashed var(--bd2);font-size:11px;font-family:var(--fn);color:var(--tx);outline:none;padding:2px 3px;}
.pva-add-inp:focus{border-bottom-color:var(--rose);}
.pva-add-amt{background:transparent;border:none;border-bottom:1px dashed var(--bd2);font-size:11px;font-family:var(--mo);color:var(--tx);outline:none;padding:2px 3px;width:54px;text-align:right;}
.pva-add-amt:focus{border-bottom-color:var(--rose);}
.pva-add-btn{background:none;border:none;color:var(--sage-dark);font-size:16px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;}
.pva-foot{padding:8px 12px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;font-size:11px;font-weight:600;background:var(--sf2);}
.nw-hero{display:grid;grid-template-columns:240px 1fr;gap:20px;margin-bottom:16px;align-items:start;}
.nw-side{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.nw-arc-grid{display:grid;grid-template-columns:340px 1fr;gap:20px;margin-bottom:16px;align-items:stretch;}
.nw-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.nw-acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.goals-hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.goal-hero-inner{display:flex;align-items:center;gap:18px;margin-bottom:14px;}
.goal-arc-wrap{position:relative;flex-shrink:0;}
.goal-arc-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:12px;pointer-events:none;}
.nw-inp-section{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px;}
.nw-sec-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.nw-account-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);}
.nw-account-row:last-of-type{border-bottom:none;}
.nw-acc-name{font-size:12px;color:var(--mu);flex:1;}
.nw-inp{background:var(--sf2);border:1px solid var(--bd2);border-radius:6px;color:var(--tx);font-size:12px;font-family:var(--mo);text-align:right;width:120px;outline:none;padding:4px 8px;transition:all .15s;}
.nw-inp:focus{border-color:var(--rose);background:var(--sf);}
.nw-del{background:none;border:none;color:var(--di);cursor:pointer;font-size:11px;padding:2px 4px;border-radius:4px;opacity:0;margin-left:4px;}
.nw-account-row:hover .nw-del{opacity:1;}

      <div class="logo">fin<span>a</span></div>

    </div>

      <button class="export-btn" onclick="exportData()">↓ Export</button>

        <div class="gear-menu" id="gearMenu" style="display:none">
          <button class="gear-item" onclick="exportData();closeGearMenu()">↓ Export data as JSON</button>
          <div class="gear-sep"></div>
          <button class="gear-item" onclick="setPin()">🔒 Set / change PIN</button>
          <button class="gear-item" onclick="removePin()">🔓 Remove PIN</button>

          <button class="gear-item" onclick="signOut()">→ Sign out</button>

<div class="toast" id="toast"></div>
<script>
// ══════════════════════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════════════════════
const _sbUrl='https://bxhhljtnjhwceuthlxct.supabase.co';
const _sbKey='sb_publishable_MwSwpszhtm5axyVjgxxgdw_iOYRcwcq';
const _sb=window.supabase.createClient(_sbUrl,_sbKey);
let _sbUser=null;
let _sbToken='';
let _sbTimer=null;

async function _sbPersist(){
  if(!_sbUser)return;
  clearTimeout(_sbTimer);
  _sbTimer=setTimeout(async()=>{
    try{
      // Settings blob — excludes heavy arrays
      const{monthlyHistory,nwSnapshots,...settings}=S;
      await _sb.from('user_settings').upsert(
        {user_id:_sbUser.id,budget:settings,updated_at:new Date().toISOString()},
        {onConflict:'user_id'}
      );
      // Monthly transactions — one row per month
      const monthRows=Object.entries(S.monthlyHistory||{}).map(([month_key,val])=>({
        user_id:_sbUser.id,month_key,
        transactions:val.transactions||[],
        updated_at:new Date().toISOString()
      }));
      if(monthRows.length){
        await _sb.from('monthly_transactions').upsert(monthRows,{onConflict:'user_id,month_key'});
      }
      // NW snapshots — delete all + reinsert (snapshots are infrequent, ~12/year)
      await _sb.from('nw_snapshots').delete().eq('user_id',_sbUser.id);
      if((S.nwSnapshots||[]).length){
        await _sb.from('nw_snapshots').insert(
          S.nwSnapshots.map(s=>({
            user_id:_sbUser.id,date:s.date,
            net:s.net,assets:s.assets,liabs:s.liabs,
            accts:s.accts||null,notes:s.notes||null
          }))
        );
      }
    }catch(e){console.warn('Supabase sync:',e);}
  },1500);
}

async function _sbLoad(){
  if(!_sbUser)return;
  try{
    // 1. Settings blob
    const{data:settingsRow,error}=await _sb.from('user_settings')
      .select('budget').eq('user_id',_sbUser.id).maybeSingle();
    if(error)throw error;
    let legacyHistory=null,legacySnaps=null;
    if(settingsRow?.budget){
      const{monthlyHistory,nwSnapshots,...settings}=settingsRow.budget;
      S={...defaultState(),...settings};
      legacyHistory=monthlyHistory||null;
      legacySnaps=nwSnapshots||null;
    }
    // 2. Monthly transactions (fall back to blob on first migration)
    const{data:txnRows}=await _sb.from('monthly_transactions')
      .select('month_key,transactions').eq('user_id',_sbUser.id);
    if(txnRows&&txnRows.length){
      S.monthlyHistory={};
      txnRows.forEach(r=>{S.monthlyHistory[r.month_key]={transactions:r.transactions||[]};});
    }else if(legacyHistory){
      S.monthlyHistory=legacyHistory;
    }
    // 3. NW snapshots (fall back to blob on first migration)
    const{data:snapRows}=await _sb.from('nw_snapshots')
      .select('date,net,assets,liabs,accts,notes')
      .eq('user_id',_sbUser.id).order('date',{ascending:true});
    if(snapRows&&snapRows.length){
      S.nwSnapshots=snapRows.map(r=>({
        date:r.date,net:Number(r.net),assets:Number(r.assets),
        liabs:Number(r.liabs),accts:r.accts,notes:r.notes
      }));
    }else if(legacySnaps){
      S.nwSnapshots=legacySnaps;
    }
    localStorage.setItem('fina_v1',JSON.stringify(S));
  }catch(e){console.warn('Supabase load:',e);}
}

function _sbAuthScreen(mode='signin'){
  const isLogin=mode==='signin';
  const ag=document.getElementById('auth-gate');
  ag.style.cssText='display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:24px;box-sizing:border-box';
  ag.innerHTML=`
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:30px">
        <div class="logo" style="font-size:36px;display:inline-block;margin-bottom:8px">fin<span>a</span></div>
        <div style="font-size:13px;color:var(--mu)">Personal finance tracker</div>
      </div>
      <div id="auth-err" style="display:none;background:var(--rose-dim);border:1px solid rgba(184,114,138,.25);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--rose-dark);margin-bottom:14px;text-align:center"></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <input id="auth-email" type="email" placeholder="Email address" class="ob-inp" style="width:100%;box-sizing:border-box">
        <input id="auth-pw" type="password" placeholder="Password" class="ob-inp" style="width:100%;box-sizing:border-box" onkeydown="if(event.key==='Enter')${isLogin?'doSignIn':'doSignUp'}()">
        <button onclick="${isLogin?'doSignIn':'doSignUp'}()" class="ob-btn" id="auth-submit-btn" style="margin-top:4px">${isLogin?'Sign in':'Create account'}</button>
        <div style="text-align:center;font-size:12px;color:var(--mu);padding-top:4px">
          ${isLogin?`No account? <span class="pva-link" onclick="_sbAuthScreen('signup')">Sign up</span>`:`Have an account? <span class="pva-link" onclick="_sbAuthScreen('signin')">Sign in</span>`}
        </div>
      </div>
    </div>`;
}

function _sbShowErr(msg){
  const el=document.getElementById('auth-err');
  if(el){el.textContent=msg;el.style.display='block';}
}

async function doSignIn(){
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pw=document.getElementById('auth-pw')?.value||'';
  if(!email||!pw){_sbShowErr('Please fill in all fields');return;}
  const btn=document.getElementById('auth-submit-btn');
  if(btn){btn.textContent='Signing in…';btn.disabled=true;}
  const{data,error}=await _sb.auth.signInWithPassword({email,password:pw});
  if(error){_sbShowErr(error.message);if(btn){btn.textContent='Sign in';btn.disabled=false;}return;}
  _sbUser=data.user;_sbToken=data.session?.access_token||'';
  await _sbLoad();
  _afterAuth();
}

async function doSignUp(){
  const email=(document.getElementById('auth-email')?.value||'').trim();
  const pw=document.getElementById('auth-pw')?.value||'';
  if(!email||!pw){_sbShowErr('Please fill in all fields');return;}
  if(pw.length<6){_sbShowErr('Password must be at least 6 characters');return;}
  const btn=document.getElementById('auth-submit-btn');
  if(btn){btn.textContent='Creating account…';btn.disabled=true;}
  const{data,error}=await _sb.auth.signUp({email,password:pw});
  if(error){_sbShowErr(error.message);if(btn){btn.textContent='Create account';btn.disabled=false;}return;}
  _sbUser=data.user;_sbToken=data.session?.access_token||'';
  _afterAuth();
}

function _afterAuth(){
  const ag=document.getElementById('auth-gate');
  ag.style.display='none';
  if(S.pin&&!sessionStorage.getItem('fina_unlocked')){
    _showPinLock();

function _showPinLock(setMode=false){
  const el=document.getElementById('pin-lock');
  const nums=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  el.innerHTML=`
    <div style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center;padding:32px 24px">

        <div style="font-size:13px;color:var(--mu);margin-bottom:22px" id="pin-label">${setMode?'Choose a 4-digit PIN':'Enter your PIN'}</div>
        <div style="display:flex;justify-content:center;gap:14px;margin-bottom:8px">
          ${[0,1,2,3].map(i=>`<div id="pind-${i}" style="width:14px;height:14px;border-radius:50%;border:2px solid var(--bd2);background:transparent;transition:background .15s"></div>`).join('')}
        </div>
        <div id="pin-err" style="font-size:12px;color:var(--rose);min-height:20px;margin-bottom:18px;text-align:center"></div>
        <div style="display:grid;grid-template-columns:repeat(3,72px);gap:10px;justify-content:center">
          ${nums.map(n=>n===''?`<div></div>`:
            `<button onclick="_pinKey('${n}')" style="width:72px;height:72px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);font-size:${n==='⌫'?'18':'20'}px;font-weight:500;font-family:var(--fn);cursor:pointer;color:var(--tx)">${n}</button>`
          ).join('')}
        </div>
        ${!setMode?`<div style="margin-top:24px"><span class="pva-link" style="font-size:12px" onclick="_pinForgot()">Forgot PIN?</span></div>`:''}
      </div>
    </div>`;
  el.style.display='block';
  window._pinEntered='';
  window._pinMode=setMode?'set':'verify';
  window._pinStep=0;
  window._pinFirst='';
}

function _pinKey(k){
  let e=window._pinEntered||'';
  if(k==='⌫'){e=e.slice(0,-1);}else if(e.length<4){e+=k;}
  window._pinEntered=e;
  for(let i=0;i<4;i++){
    const d=document.getElementById(`pind-${i}`);
    if(d)d.style.background=i<e.length?'var(--rose)':'transparent';
  }
  if(e.length===4)setTimeout(()=>_pinSubmit(e),120);
}

function _pinSubmit(entered){
  if(window._pinMode==='verify'){
    if(entered===S.pin){
      document.getElementById('pin-lock').style.display='none';
      sessionStorage.setItem('fina_unlocked','1');
      _launchApp();
    } else {
      window._pinEntered='';
      for(let i=0;i<4;i++){const d=document.getElementById(`pind-${i}`);if(d)d.style.background='transparent';}
      const err=document.getElementById('pin-err');
      if(err){err.textContent='Incorrect PIN';setTimeout(()=>err.textContent='',2000);}
    }
  } else {
    if(window._pinStep===0){
      window._pinFirst=entered;window._pinStep=1;window._pinEntered='';
      for(let i=0;i<4;i++){const d=document.getElementById(`pind-${i}`);if(d)d.style.background='transparent';}
      const lbl=document.getElementById('pin-label');if(lbl)lbl.textContent='Confirm your PIN';
      const err=document.getElementById('pin-err');if(err)err.textContent='';
    } else {
      if(entered===window._pinFirst){
        S.pin=entered;persist();
        document.getElementById('pin-lock').style.display='none';
        sessionStorage.setItem('fina_unlocked','1');
        _launchApp();showToast('PIN set!','ok');
      } else {
        window._pinEntered='';window._pinStep=0;window._pinFirst='';
        for(let i=0;i<4;i++){const d=document.getElementById(`pind-${i}`);if(d)d.style.background='transparent';}
        const lbl=document.getElementById('pin-label');if(lbl)lbl.textContent='Choose a 4-digit PIN';
        const err=document.getElementById('pin-err');
        if(err){err.textContent="PINs don't match. Try again.";setTimeout(()=>err.textContent='',2000);}
      }
    }
  }
}

async function _pinForgotSubmit(){
  const pw=document.getElementById('pforgot-pw')?.value||'';
  if(!pw)return;
  const btn=document.getElementById('pforgot-btn');
  if(btn){btn.textContent='Verifying…';btn.disabled=true;}
  const{error}=await _sb.auth.signInWithPassword({email:_sbUser?.email||'',password:pw});
  if(error){
    const err=document.getElementById('pforgot-err');
    if(err){err.textContent='Incorrect password.';err.style.display='block';}

function removePin(){

function _launchApp(){

async function startApp(){
  try{
    const{data:{session}}=await _sb.auth.getSession();
    if(!session){_sbAuthScreen('signin');return;}
    _sbUser=session.user;_sbToken=session.access_token||'';
    await _sbLoad();

    } else {

    }
  }catch(e){
    console.warn('Auth check failed:',e);

  }
}

function animateCounters(container){
  (container||document).querySelectorAll('[data-count]').forEach(el=>{
    const target=parseFloat(el.dataset.count)||0;

    const dur=650,start=performance.now();
    const tick=now=>{

      const ease=1-Math.pow(1-p,3);
      el.textContent='$'+Math.round(Math.abs(target)*ease).toLocaleString('en-US');

// ══════════════════════════════════════════════════════════════
// COMPUTE ACTUALS — single source of truth
// ══════════════════════════════════════════════════════════════
function computeActuals(monthKey){
  const txns=(S.monthlyHistory[monthKey]||{}).transactions||[];
  const byCard={};
  txns.filter(t=>!t._skip).forEach(t=>{
    const card=S.cards.find(c=>c.id===t.cardId)||{type:'personal',split:100};
    const base=card.type==='shared'?(t._full?t.amount:t.amount*(card.split/100)):t.amount;
    const amt=t._override!==undefined?t._override:base;
    if(!byCard[t.cardId])byCard[t.cardId]={};
    byCard[t.cardId][t.category]=(byCard[t.cardId][t.category]||0)+amt;
  });
  // Merge spending across personal cards — matches how PVA displays the personal panel
  const personalPool={};
  S.cards.filter(c=>c.type!=='shared').forEach(card=>{
    Object.entries(byCard[card.id]||{}).forEach(([cat,val])=>{personalPool[cat]=(personalPool[cat]||0)+val;});
  });
  const catActuals={};
  let varBud=0,varAct=0;
  // Personal cards: deduplicate categories so catActuals and varAct count each category once
  const seenPersonalCats=new Set();
  S.cards.filter(c=>c.type!=='shared').forEach(card=>{
    (card.budgets||[]).forEach(b=>{
      const cat=b.cat||b.name;
      const act=personalPool[cat]||0;
      varBud+=b.budget;
      if(!seenPersonalCats.has(cat)){seenPersonalCats.add(cat);catActuals[cat]=(catActuals[cat]||0)+act;varAct+=act;}
    });
  });
  // Shared cards: per-card lookup
  S.cards.filter(c=>c.type==='shared').forEach(card=>{
    (card.budgets||[]).forEach(b=>{
      const cat=b.cat||b.name;
      const act=(byCard[card.id]||{})[cat]||0;
      varBud+=b.budget;varAct+=act;
      catActuals[cat]=(catActuals[cat]||0)+act;
    });
  });
  const fixedBud=(S.fixedItems||[]).reduce((s,i)=>s+i.budget,0);
  const savBud=(S.savingsItems||[]).reduce((s,i)=>s+i.budget,0);
  const totalBud=varBud+fixedBud+savBud;
  const totalAct=varAct+fixedBud+savBud;
  return{txns,byCard,personalPool,catActuals,varBud,varAct,fixedBud,savBud,totalBud,totalAct,delta:totalBud-totalAct};
}

function dashMonthNav(dir){
  if(!window._dashNavMonth)window._dashNavMonth=new Date(S.currentMonth);
  window._dashNavMonth=new Date(window._dashNavMonth.getFullYear(),window._dashNavMonth.getMonth()+dir,1);

function arcCard(goal){
  const total=goal.entries.reduce((s,e)=>s+e.amount,0);
  const pct=Math.min(total/goal.target,1);
  const gap=Math.max(goal.target-total,0);
  const last3=goal.entries.slice(-3);
  const avg=last3.length?last3.reduce((s,e)=>s+e.amount,0)/last3.length:goal.monthly||0;
  const months=gap>0&&avg>0?Math.ceil(gap/avg):gap===0?0:null;
  const off=295*(1-pct);
  return`<div class="arc-card">
    <div class="arc-card-title">${goal.name}</div>
    <div class="arc-row">
      <svg width="120" height="76" viewBox="0 0 120 76" aria-hidden="true">
        <path d="M 8 70 A 52 52 0 0 1 112 70" fill="none" stroke="var(--sf3)" stroke-width="8" stroke-linecap="round"/>
        <path d="M 8 70 A 52 52 0 0 1 112 70" fill="none" stroke="${goal.color}" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="295" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .8s"/>
      </svg>
      <div class="arc-meta">
        <div class="arc-main-val" data-count="${total}">${fd(total)}</div>
        <div class="arc-of">of ${fd(goal.target)} · ${(pct*100).toFixed(1)}%</div>
        <div class="arc-sub" style="color:${goal.color}">${months===0?'🎉 Done!':months===null?'—':months+' mo left'}</div>
      </div>
    </div>
  </div>`;
}

function buildDonutData(A){
  const entries=Object.entries(A.catActuals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0)||1;
  const COLORS=['#B8728A','#5A8A6A','#4A7090','#A0784A','#7A5FA0','#C4B8B2'];
  const top=entries.slice(0,5);
  const otherAmt=entries.slice(5).reduce((s,[,v])=>s+v,0);
  const slices=top.map(([name,val],i)=>({name,val,color:COLORS[i],pct:val/total}));
  if(otherAmt>0)slices.push({name:'Other',val:otherAmt,color:'#C4B8B2',pct:otherAmt/total});
  return{slices,total:entries.reduce((s,[,v])=>s+v,0)};
}

function buildMovers(A){
  const movers=[];
  // Personal cards: one mover per category, sum budgets across cards, compare to personalPool
  const personalBudByCat={};
  S.cards.filter(c=>c.type!=='shared').forEach(card=>{
    (card.budgets||[]).forEach(b=>{
      if(!b.budget)return;
      const cat=b.cat||b.name;
      if(!personalBudByCat[cat])personalBudByCat[cat]={name:b.name,budget:0};
      personalBudByCat[cat].budget+=b.budget;
    });
  });
  Object.entries(personalBudByCat).forEach(([cat,{name,budget}])=>{
    const act=A.personalPool[cat]||0;
    const diff=act-budget;
    if(Math.abs(diff)>5)movers.push({name,diff,dir:diff>0?'over':'under'});
  });
  // Shared cards: per-card comparison
  S.cards.filter(c=>c.type==='shared').forEach(card=>{
    (card.budgets||[]).forEach(b=>{
      if(!b.budget)return;
      const act=(A.byCard[card.id]||{})[b.cat||b.name]||0;
      const diff=act-b.budget;
      if(Math.abs(diff)>5)movers.push({name:b.name,diff,dir:diff>0?'over':'under'});
    });
  });
  movers.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  return[...movers.filter(m=>m.dir==='over').slice(0,2),...movers.filter(m=>m.dir==='under').slice(0,2)];
}

function donutBudgetHTML({slices,total},movers){
  const r=38,cx=48,cy=48,circ=2*Math.PI*r;
  let off=0;
  const paths=slices.map(s=>{
    const dash=s.pct*circ;
    const p=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="16" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=dash;return p;
  }).join('');
  const legend=slices.map(s=>`<div class="li">
    <div class="li-dot" style="background:${s.color}"></div>
    <div class="li-name">${s.name}</div>
    <div class="li-bar"><div class="li-fill" style="width:${Math.round(s.pct*32)}px;background:${s.color}"></div></div>
    <div class="li-pct" style="color:${s.pct>0.25?'var(--rose-dark)':'var(--mu)'}">${(s.pct*100).toFixed(0)}%</div>
  </div>`).join('');
  const moverHTML=movers.map(m=>`<div class="mover ${m.dir}">
    <div class="mover-cat">${m.name}</div>
    <div class="mover-amt ${m.dir}">${m.dir==='over'?'+':'-'}${fd(Math.abs(m.diff))}</div>
  </div>`).join('');
  if(!total)return`<div style="font-size:12px;color:var(--mu);text-align:center;padding:20px">Upload a statement to see your budget breakdown</div>`;
  return`<div class="donut-legend-row">
    <div class="donut-wrap" style="width:96px;height:96px">
      <svg width="96" height="96" viewBox="0 0 96 96" aria-hidden="true">
        <circle cx="48" cy="48" r="38" fill="none" stroke="var(--sf3)" stroke-width="16"/>
        ${paths}
      </svg>
      <div class="donut-center"><div class="donut-val" data-count="${total}">${fd(total)}</div><div class="donut-lbl">spent</div></div>
    </div>
    <div class="legend">${legend}</div>
  </div>
  ${movers.length?`<div class="divider"></div>
  <div class="movers-lbl">Needs attention</div>
  <div class="movers-grid">${moverHTML}</div>
  <div class="budget-footer">
    <div class="budget-footer-stat"><span style="color:var(--rose-dark);font-weight:600">${movers.filter(m=>m.dir==='over').length}</span> over · <span style="color:var(--sage-dark);font-weight:600">${movers.filter(m=>m.dir==='under').length}</span> under</div>
    <span class="pva-link" onclick="switchTab('pva')">Full breakdown →</span>
  </div>`:''}`;
}

function renderTxnTable(){
  const key=cmk();
  const txns=(S.monthlyHistory[key]||{}).transactions||[];
  txns.forEach(t=>{if(!t._id)t._id=uid();});
  const q=(document.getElementById('txnSearch')?.value||'').toLowerCase();
  const f=window._txnFilters||{};
  const filtered=txns.filter(t=>{
    if(f.cat&&t.category!==f.cat)return false;
    if(f.cardId&&t.cardId!==f.cardId)return false;
    if(q&&!t.merchant?.toLowerCase().includes(q)&&!t.category?.toLowerCase().includes(q))return false;
    return true;
  });
  const sort=window._txnSort||'amount';
  const sorted=[...filtered].sort((a,b)=>{
    if(sort==='cat')return(a.category||'').localeCompare(b.category||'');
    if(sort==='date')return(b.date||'').localeCompare(a.date||'');
    if(sort==='merchant')return(a.merchant||'').localeCompare(b.merchant||'');
    const ga=a._override!==undefined?a._override:a.amount;
    const gb=b._override!==undefined?b._override:b.amount;
    return gb-ga;
  });

  const chips=document.getElementById('filterChips');
  if(chips){
    let h='';
    if(f.cat)h+=`<div class="filter-chip chip-cat">${f.cat}<button class="chip-x" onclick="clearCatFilter()">×</button></div>`;
    if(f.cardId){const c=S.cards.find(c=>c.id===f.cardId);if(c)h+=`<div class="filter-chip chip-src">${c.name}<button class="chip-x" onclick="clearCardFilter()">×</button></div>`;}
    chips.innerHTML=h;
  }

  const wrap=document.getElementById('txnTableWrap');if(!wrap)return;
  if(!txns.length){
    wrap.innerHTML=`<div class="table-wrap"><div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">No transactions yet</div><div class="empty-sub">Upload a statement above</div></div></div>`;
    return;
  }
  const allCats=[...new Set(S.cards.flatMap(c=>(c.budgets||[]).map(b=>b.cat||b.name)))].filter(c=>c&&c!=='Other').sort();
  allCats.push('Other');
  const si=s=>sort===s?'<span style="font-size:10px;color:var(--rose-dark);margin-left:2px">↑</span>':'';
  const rows=sorted.map(t=>{
    const card=S.cards.find(c=>c.id===t.cardId)||{name:'?',type:'personal',split:100,color:'#C4B8B2'};
    const isShared=card.type==='shared';
    const base=isShared?(t._full?t.amount:t.amount*(card.split/100)):t.amount;
    const disp=t._override!==undefined?t._override:base;
    const hasOvr=t._override!==undefined;
    const cc=CAT_COLORS[t.category]||'cc-other';
    const opts=allCats.map(c=>`<option${c===t.category?' selected':''}>${c}</option>`).join('');
    return`<tr class="${t._skip?'excluded':''}">
      <td class="date-cell">${t.date||'—'}</td>
      <td>
        <span class="card-pill" style="background:${card.color}22;color:${card.color}">${card.name}</span>
        <span class="merchant-name">${t.merchant||'—'}</span>
      </td>
      <td><span class="pill ${cc}" style="padding:1px 0"><select class="cat-select" onchange="updateCat('${t._id}',this.value)">${opts}</select></span></td>
      <td>
        <div class="amt-wrap">
          ${hasOvr?`<span class="amt-revert" onclick="revertAmt('${t._id}')">↩ ${fd(base)}</span>`:''}
          <span class="amt-val${hasOvr?' overridden':''}" onclick="editAmt('${t._id}')" data-id="${t._id}">${fd(disp)}</span>
          ${isShared?`<span class="split-badge${t._full?' full':''}" onclick="toggleFull('${t._id}')" title="${t._full?'Counting full amount — click to split':'Counting your share (½) — click for full'}">${t._full?'1':'½'}</span>`:''}
        </div>
      </td>
      <td style="text-align:right;white-space:nowrap"><button class="excl-btn${t._skip?' restore':''}" onclick="toggleSkip('${t._id}')" title="${t._skip?'Restore to budget':'Exclude from budget calculations'}">${t._skip?'restore':'exclude'}</button><button class="excl-btn" onclick="deleteTxn('${t._id}')" title="Delete permanently" style="margin-left:6px;color:var(--rose-dark);border-color:var(--rose)">✕</button></td>
    </tr>`;
  }).join('');
  wrap.innerHTML=`<div class="table-wrap">
    <div class="table-meta">
      <span class="card-title">Transactions <span style="font-weight:400;color:var(--mu);font-size:11px">· ${filtered.length} of ${txns.length}</span></span>
      <span class="table-hint">Click amount to edit</span>
    </div>
    <table class="txn"><thead><tr>
      <th onclick="setTxnSort('date')" class="${sort==='date'?'sorted':''}">Date${si('date')}</th>
      <th onclick="setTxnSort('merchant')" class="${sort==='merchant'?'sorted':''}">Merchant${si('merchant')}</th>
      <th onclick="setTxnSort('cat')" class="${sort==='cat'?'sorted':''}">Category${si('cat')}</th>
      <th onclick="setTxnSort('amount')" class="${sort==='amount'?'sorted':''}">Amount${si('amount')}</th>
      <th></th>
    </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function updateCat(id,cat){

}
function toggleSkip(id){
  const key=cmk();const txns=(S.monthlyHistory[key]||{}).transactions||[];
  const t=txns.find(t=>t._id===id);if(t){t._skip=!t._skip;persist();renderTxnTable();}

function deleteTxn(id){
  const key=cmk();const rec=S.monthlyHistory[key];if(!rec)return;
  const t=(rec.transactions||[]).find(t=>t._id===id);
  if(!confirm(`Delete "${t?.merchant||'this transaction'}" permanently?`))return;
  rec.transactions=(rec.transactions||[]).filter(t=>t._id!==id);
  persist();renderTxn();showToast('Transaction deleted','ok');

function toggleFull(id){
  const key=cmk();const txns=(S.monthlyHistory[key]||{}).transactions||[];
  const t=txns.find(t=>t._id===id);if(t){t._full=!t._full;delete t._override;persist();renderTxnTable();}

function editAmt(id){
  const key=cmk();const txns=(S.monthlyHistory[key]||{}).transactions||[];
  const t=txns.find(t=>t._id===id);if(!t)return;
  const span=document.querySelector(`[data-id="${id}"]`);if(!span||span.querySelector('input'))return;
  const card=S.cards.find(c=>c.id===t.cardId)||{type:'personal',split:100};
  const base=card.type==='shared'?(t._full?t.amount:t.amount*(card.split/100)):t.amount;
  const cur=t._override!==undefined?t._override:base;
  const inp=document.createElement('input');
  inp.type='number';inp.value=cur.toFixed(2);inp.step='0.01';
  inp.style.cssText='width:70px;font-size:12px;font-family:var(--mo);border:1px solid var(--rose);border-radius:4px;padding:2px 5px;background:var(--sf);color:var(--tx);outline:none;text-align:right;';
  span.innerHTML='';span.appendChild(inp);inp.focus();inp.select();
  const save=()=>{
    const n=parseFloat(inp.value);
    if(!isNaN(n)&&Math.abs(n-base)>0.005)t._override=Math.round(n*100)/100;
    else delete t._override;
    persist();renderTxnTable();
  };
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.removeEventListener('blur',save);renderTxnTable();}});
}
function revertAmt(id){
  const key=cmk();const txns=(S.monthlyHistory[key]||{}).transactions||[];
  const t=txns.find(t=>t._id===id);if(t){delete t._override;persist();renderTxnTable();}
}

function handleDrop(e,cardId){const f=e.dataTransfer.files[0];if(f)processUpload(f,cardId);}

async function processUpload(file,cardId){
  const sEl=document.getElementById(`upst_${cardId}`);
  if(sEl){sEl.textContent='⏳ Parsing…';sEl.className='up-status loading';}
  const card=S.cards.find(c=>c.id===cardId);if(!card)return;
  const isCSV=/\.csv$/i.test(file.name);
  const budgetCats=(card.budgets||[]).map(b=>b.cat||b.name);
  const catListBase=budgetCats.join('|')||'Dining & food|Transport & gas|Shopping|Fitness|Health|Travel|Subscriptions|Personal care|Entertainment|Other';
  const catList=catListBase.includes('Other')?catListBase:catListBase+'|Other';
  try{
    if(isCSV){
      const text=await file.text();
      const txns=text.split('\n').slice(1).filter(l=>l.trim()).map(l=>{
        const p=l.split(',');
        return{_id:uid(),date:(p[0]||'').replace(/"/g,''),merchant:(p[2]||p[1]||'').replace(/"/g,''),amount:Math.abs(parseFloat(p[4]||p[3]||0)),category:'Other',cardId};
      }).filter(t=>t.amount>0);
      storeAndRefresh(txns,cardId,sEl);return;
    }
    const isImg=/\.(png|jpe?g|webp)$/i.test(file.name);
    const mime=isImg?(file.type||'image/png'):'application/pdf';
    const b64=await toB64(file);
    const _md=new Date(S.currentMonth);const _ms=`${String(_md.getMonth()+1).padStart(2,'0')}/01/${String(_md.getFullYear()).slice(-2)}`;
    const sys=`You are a JSON-only financial data extractor. Given any financial document or image, extract spending and output ONLY a valid JSON array — no markdown, no explanation.

Rules:
- Individual transactions → extract each charge with its actual date
- Category totals or summary table → one entry per row; set merchant = the category row label
- Any other format with spending amounts → extract whatever you can find
- For entries with no visible date use "${_ms}"
- For every entry, map category to the single closest match from this list: ${catList}
- If nothing in the list is a reasonable match, use "Other"
- Skip payments, refunds, credits, and balance transfers
- Return [] only if the image contains zero spending data

Format: [{"date":"MM/DD/YY","merchant":"clean name","amount":12.34,"category":"..."}]`;
    const resp=await fetch('/.netlify/functions/parse',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${_sbToken}`},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,system:sys,messages:[{role:'user',content:[{type:isImg?'image':'document',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Extract transactions as JSON array.'}]}]})});
    if(!resp.ok)throw new Error(`API ${resp.status}`);
    const data=await resp.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'[]';
    let js=raw.replace(/```json\n?|```/g,'').trim();
    const a=js.indexOf('['),z=js.lastIndexOf(']');
    if(a!==-1&&z>a)js=js.slice(a,z+1);
    const catSet=new Set(budgetCats.map(c=>c.toLowerCase()));
    const parsed=JSON.parse(js).map(t=>{
      let cat=t.category||'Other';
      if(budgetCats.length){
        // If AI gave us a category not in the budget list, fall back to Other
        if(!catSet.has(cat.toLowerCase()))cat='Other';
      }
      return{...t,_id:uid(),cardId,category:cat};
    });
    storeAndRefresh(parsed,cardId,sEl);
  }catch(err){
    if(sEl){sEl.textContent='✗ '+err.message;sEl.className='up-status error';}
    showToast('Parse failed: '+err.message,'err');
  }
}
function storeAndRefresh(txns,cardId,sEl){
  const key=cmk();
  if(!S.monthlyHistory[key])S.monthlyHistory[key]={transactions:[]};
  S.monthlyHistory[key].transactions=[...S.monthlyHistory[key].transactions.filter(t=>t.cardId!==cardId),...txns];
  const card=S.cards.find(c=>c.id===cardId);
  if(card){
    if(!card.budgets)card.budgets=[];
    const existing=new Set(card.budgets.map(b=>b.cat||b.name));
    [...new Set(txns.map(t=>t.category).filter(c=>c))].filter(c=>!existing.has(c)).forEach(c=>card.budgets.push({name:c,cat:c,budget:0}));
  }
  persist();
  if(sEl){sEl.textContent=`✓ ${txns.length} transactions`;sEl.className='up-status done';}
  renderTxnTable();showToast(`${txns.length} transactions loaded`,'ok');
}
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Read failed'));r.readAsDataURL(file);});}

function pvaPanelCard(title,cards,A,color){
  const budgets=cards.flatMap(c=>(c.budgets||[]).map(b=>({...b,cardId:c.id})));
  const actuals={};
  cards.forEach(card=>{
    const ca=A.byCard[card.id]||{};
    Object.entries(ca).forEach(([cat,val])=>{actuals[cat]=(actuals[cat]||0)+val;});
  });
  const tBud=budgets.reduce((s,b)=>s+b.budget,0);
  const tAct=budgets.reduce((s,b)=>s+(actuals[b.cat||b.name]||0),0);
  const delta=tBud-tAct;
  const firstCard=cards[0];
  const rows=budgets.map((b,gi)=>{
    const act=actuals[b.cat||b.name]||0;
    const pct=b.budget>0?Math.min(act/b.budget,1.5):0;
    const v=b.budget-act;const over=act>b.budget;
    return`<div class="pva-item clickable" draggable="true"
      ondragstart="pvaDragStart('${b.cardId}','${b.cat||b.name}',event)"
      ondragover="pvaDragOver(event)"
      ondragleave="pvaDragLeave(event)"
      ondrop="pvaDrop('${b.cardId}','${b.cat||b.name}',event)"
      ondragend="pvaDragEnd(event)"
      onclick="filterToCategory('${b.cat||b.name}','${b.cardId}')">
      <span class="pva-name" onclick="event.stopPropagation()" ondblclick="event.stopPropagation();renamePVABudget('${b.cardId}','${b.cat||b.name}')">${b.name}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(pct*100,100)}%;background:${over?'var(--rose)':'var(--sage)'}"></div></div>
      <span class="pva-actual" style="color:${over?'var(--rose-dark)':'var(--tx)'}">${fd(act)}</span>
      <input class="pva-bud-inp" value="${b.budget}" onclick="event.stopPropagation()"
        onblur="savePVABudget('${b.cardId}','${b.cat||b.name}',this.value,this)"
        onkeydown="if(event.key==='Enter')this.blur()">
      <span class="pva-var" style="color:${v>=0?'var(--sage-dark)':'var(--rose-dark)'}">${(v>=0?'+':'')+fd(Math.abs(v))}</span>
      <button class="pva-del" onclick="event.stopPropagation();deletePVABudget('${b.cardId}','${b.cat||b.name}')">✕</button>
    </div>`;
  }).join('');
  return`<div class="pva-panel">
    <div class="pva-panel-head" style="border-left-color:${color}">
      <div class="pva-panel-title">${title}${cards.length>1?` (${cards.map(c=>c.name).join(', ')})`:` · ${cards[0]?.name||''}`}</div>
      <div class="pva-delta ${delta>=0?'under':'over'}">${delta>=0?fd(delta)+' under':fd(Math.abs(delta))+' over'}</div>
    </div>
    ${rows}
    <div class="pva-add-row">

function savePVABudget(cardId,catKey,val,el){
  const n=parseFloat(val);if(isNaN(n))return;
  const card=S.cards.find(c=>c.id===cardId);if(!card)return;
  const b=card.budgets?.find(b=>(b.cat||b.name)===catKey);
  if(b&&b.budget!==n){b.budget=n;persist();
    if(el){el.style.borderBottomColor='var(--sage)';el.style.color='var(--sage-dark)';setTimeout(()=>renderPVAGrid(),420);}
    else renderPVAGrid();}
}
function deletePVABudget(cardId,catKey){
  const card=S.cards.find(c=>c.id===cardId);if(!card)return;
  const idx=card.budgets?.findIndex(b=>(b.cat||b.name)===catKey);
  if(idx===-1||idx===undefined)return;
  if(!confirm(`Remove "${card.budgets[idx].name}"?`))return;
  card.budgets.splice(idx,1);persist();renderPVAGrid();
}
function addPVABudget(cardId){
  const n=document.getElementById(`padd-n-${cardId}`)?.value?.trim();
  const a=parseFloat(document.getElementById(`padd-a-${cardId}`)?.value)||0;
  if(!n)return;
  const card=S.cards.find(c=>c.id===cardId);if(!card)return;
  if(!card.budgets)card.budgets=[];
  card.budgets.push({name:n,cat:n,budget:a});
  persist();renderPVAGrid();showToast(`"${n}" added`,'ok');
}
function renamePVABudget(cardId,catKey){
  const card=S.cards.find(c=>c.id===cardId);if(!card)return;
  const b=card.budgets?.find(b=>(b.cat||b.name)===catKey);if(!b)return;
  const old=b.name;
  const el=document.querySelector(`.pva-name[ondblclick*="${catKey}"]`);if(!el)return;
  const inp=document.createElement('input');
  inp.value=old;inp.style.cssText='width:100%;font-size:11px;font-family:var(--fn);border:none;border-bottom:1px solid var(--rose);background:transparent;color:var(--tx);outline:none;';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  const save=()=>{
    const n=inp.value.trim();if(!n||n===old){renderPVAGrid();return;}
    b.name=n;if(b.cat===old)b.cat=n;
    const key=cmk();
    (S.monthlyHistory[key]?.transactions||[]).forEach(t=>{if(t.category===old)t.category=n;});
    persist();renderPVAGrid();showToast(`Renamed to "${n}"`,'ok');
  };
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.removeEventListener('blur',save);renderPVAGrid();}});
}
function savePVASimple(key,idx,val,el){
  const n=parseFloat(val);if(isNaN(n))return;
  const arr=key==='fixed'?S.fixedItems:S.savingsItems;
  if(arr[idx]&&arr[idx].budget!==n){arr[idx].budget=n;persist();
    if(el){el.style.borderBottomColor='var(--sage)';el.style.color='var(--sage-dark)';}}
}
function deletePVASimple(key,idx){
  const arr=key==='fixed'?S.fixedItems:S.savingsItems;
  if(!confirm(`Remove "${arr[idx]?.name}"?`))return;
  arr.splice(idx,1);persist();renderPVAGrid();
}
function addPVASimple(key){
  const n=document.getElementById(`sadd-n-${key}`)?.value?.trim();
  const a=parseFloat(document.getElementById(`sadd-a-${key}`)?.value)||0;
  if(!n)return;
  const arr=key==='fixed'?S.fixedItems:S.savingsItems;
  arr.push({name:n,budget:a});persist();renderPVAGrid();
}
function pvaDragStart(cardId,cat,e){window._pvaDrag={cardId,cat};e.dataTransfer.effectAllowed='move';e.currentTarget.style.opacity='0.4';}
function pvaDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function pvaDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function pvaDragEnd(e){e.currentTarget.style.opacity='';e.currentTarget.classList.remove('drag-over');}
function pvaDrop(cardId,cat,e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const d=window._pvaDrag;window._pvaDrag=null;
  if(!d||d.cardId!==cardId||d.cat===cat)return;
  const card=S.cards.find(c=>c.id===cardId);if(!card?.budgets)return;
  const fi=card.budgets.findIndex(b=>(b.cat||b.name)===d.cat);
  const ti=card.budgets.findIndex(b=>(b.cat||b.name)===cat);
  if(fi===-1||ti===-1)return;
  const[item]=card.budgets.splice(fi,1);
  card.budgets.splice(ti,0,item);
  persist();renderPVAGrid();
}
function renamePVASimple(key,idx){
  const arr=key==='fixed'?S.fixedItems:S.savingsItems;
  const item=arr[idx];if(!item)return;
  const old=item.name;
  const els=document.querySelectorAll(`.pva-name[ondblclick*="renamePVASimple('${key}',${idx})"]`);
  const el=els[0];if(!el)return;
  const inp=document.createElement('input');
  inp.value=old;inp.style.cssText='width:100%;font-size:11px;font-family:var(--fn);border:none;border-bottom:1px solid var(--rose);background:transparent;color:var(--tx);outline:none;';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  inp.addEventListener('blur',()=>{const n=inp.value.trim();if(n&&n!==old)item.name=n;persist();renderPVAGrid();});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
}
function editIncome(){
  const el=document.getElementById('incomeKPI');if(!el||el.querySelector('input'))return;
  const inp=document.createElement('input');
  inp.type='number';inp.value=S.income||0;
  inp.style.cssText='width:100%;font-size:20px;font-weight:600;font-family:var(--mo);border:none;border-bottom:2px solid var(--rose);background:transparent;color:var(--sage-dark);outline:none;text-align:center;';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  const save=()=>{const n=parseFloat(inp.value);if(!isNaN(n)&&n>=0){S.income=n;persist();}renderPVA();};
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.removeEventListener('blur',save);renderPVA();}});
}

  const last3=goal.entries.slice(-3);
  const avg=last3.length?last3.reduce((s,e)=>s+e.amount,0)/last3.length:goal.monthly;
  const months=gap>0&&avg>0?Math.ceil(gap/avg):gap===0?0:null;
  const off=295*(1-pct);
  let running=0;
  const entryRows=goal.entries.map(e=>{running+=e.amount;return`
    <tr>
      <td style="font-size:12px;padding:6px 0">${e.month}</td>
      <td style="font-size:12px;color:${e.amount>=(goal.monthly||0)?'var(--sage-dark)':'var(--caramel)'};padding:6px 0">${e.amount>=(goal.monthly||0)?'✓ on track':'⚠ under'}</td>
      <td style="font-family:var(--mo);font-size:12px;text-align:right;color:${e.amount>=(goal.monthly||0)?'var(--sage-dark)':'var(--caramel)'};padding:6px 0">${fd(e.amount)}</td>
      <td style="font-family:var(--mo);font-size:12px;text-align:right;font-weight:600;padding:6px 0">${fd(running)}</td>
      <td style="text-align:right;padding:6px 0"><button class="excl-btn" onclick="deleteGoalEntry('${goal.id}','${e.id}')">✕</button></td>
    </tr>`}).join('');
  return`<div class="card">
    <div class="card-head">
      <div class="card-title">${goal.name}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px;cursor:pointer" onclick="toggleStar('${goal.id}')" title="${goal.starred?'Primary goal':'Set as primary'}">${goal.starred?'⭐':'☆'}</span>
        <button class="excl-btn" onclick="deleteGoal('${goal.id}')">Delete</button>
      </div>
    </div>
    <div style="padding:16px 18px">
      <div class="goal-hero-inner">
        <div class="goal-arc-wrap">
          <svg width="130" height="84" viewBox="0 0 130 84" aria-hidden="true">
            <path d="M 8 78 A 57 57 0 0 1 122 78" fill="none" stroke="var(--sf3)" stroke-width="9" stroke-linecap="round"/>
            <path d="M 8 78 A 57 57 0 0 1 122 78" fill="none" stroke="${goal.color}" stroke-width="9" stroke-linecap="round"
              stroke-dasharray="295" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .8s"/>
          </svg>
          <div class="goal-arc-overlay">
            <div style="font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:3px">${goal.name}</div>
            <div style="font-size:26px;font-weight:600;color:var(--tx);line-height:1">${fd(total)}</div>
            <div style="font-size:11px;color:var(--mu);margin-top:4px">of ${fd(goal.target)} · ${(pct*100).toFixed(1)}%</div>
          </div>
        </div>
        <div>
          <div class="goal-text-vals" style="font-size:24px;font-weight:600;color:var(--tx)">${fd(total)}</div>
          <div class="goal-text-vals" style="font-size:12px;color:var(--mu);margin-top:2px">of ${fd(goal.target)} · ${(pct*100).toFixed(1)}%</div>
          <div class="goal-stats">
            <div class="gs"><div class="lbl">Monthly target</div><div class="val" style="color:var(--sage-dark)">${fd(goal.monthly)}</div></div>
            <div class="gs"><div class="lbl">Months left</div><div class="val" style="color:${goal.color};white-space:nowrap">${months===0?'🎉':months===null?'—':months+' mo'}</div></div>
            <div class="gs"><div class="lbl">Remaining</div><div class="val" style="color:var(--rose-dark)">${fd(gap)}</div></div>
          </div>
        </div>
      </div>

          <button class="add-entry-btn" onclick="addGoalEntry('${goal.id}')">+ Add</button>
        </div>
      </div>
      ${goal.entries.length?`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;border-top:1px solid var(--bd)">
        <thead><tr style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.07em">

function monthToInput(str){
  // "June 2026" → "2026-06"
  const parts=(str||'').split(' ');
  if(parts.length<2)return '';
  const mi=MONTHS.indexOf(parts[0]);
  if(mi<0)return '';
  return`${parts[1]}-${String(mi+1).padStart(2,'0')}`;
}
function inputToMonth(val){
  // "2026-06" → "June 2026"
  if(!val)return '';
  const [y,m]=val.split('-');
  return`${MONTHS[parseInt(m)-1]} ${y}`;
}

let _goalColor=GOAL_COLORS[0];
function pickGoalColor(c){
  _goalColor=c;
  document.querySelectorAll('#goalColors [data-c]').forEach(el=>{el.style.border=el.dataset.c===c?'2px solid var(--tx)':'2px solid transparent';});

function addGoal(){
  const name=document.getElementById('ng-name')?.value?.trim();
  const target=parseFloat(document.getElementById('ng-target')?.value)||0;
  const monthly=parseFloat(document.getElementById('ng-monthly')?.value)||0;
  const star=document.getElementById('ng-star')?.checked;
  if(!name||!target){showToast('Enter name and target','err');return;}
  if(star)S.goals.forEach(g=>g.starred=false);
  S.goals.push({id:uid(),name,target,monthly,color:_goalColor,starred:star||S.goals.length===0,entries:[]});
  closeGoalModal();persist();renderGoals();showToast(`"${name}" added!`,'ok');
}
function deleteGoal(id){
  if(!confirm('Delete this goal and all entries?'))return;
  S.goals=S.goals.filter(g=>g.id!==id);persist();renderGoals();
}
function toggleStar(id){S.goals.forEach(g=>g.starred=g.id===id);persist();renderGoals();}
function addGoalEntry(goalId){
  const rawMonth=document.getElementById(`em_${goalId}`)?.value?.trim();
  const month=inputToMonth(rawMonth)||rawMonth;
  const amt=parseFloat(document.getElementById(`ea_${goalId}`)?.value)||0;
  if(!month||amt<=0){showToast('Pick a month and enter amount','err');return;}
  const goal=S.goals.find(g=>g.id===goalId);if(!goal)return;
  goal.entries.push({month,amount:amt,id:uid()});
  goal.entries.sort((a,b)=>a.month.localeCompare(b.month));
  persist();renderGoals();showToast('Entry added!','ok');
}
function deleteGoalEntry(goalId,entryId){
  const goal=S.goals.find(g=>g.id===goalId);if(!goal)return;
  goal.entries=goal.entries.filter(e=>e.id!==entryId);persist();renderGoals();
}

function calcNWNet(){
  const assets=S.nwAccounts.reduce((s,a)=>s+pc(a.value),0);
  const liabs=S.nwLiabilities.reduce((s,l)=>s+pc(l.value),0);
  return assets-liabs;
}

  const snapRows=S.nwSnapshots.slice().reverse().map((snap,ri)=>{

function acctTableHTML(range){
  if(!S.nwSnapshots.length)return'<div style="padding:24px;text-align:center;font-size:12px;color:var(--mu)">Save snapshots to see history</div>';
  let snaps=[...S.nwSnapshots].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const now=new Date();
  if(range==='6m')snaps=snaps.filter(s=>new Date(s.date)>=new Date(now.getFullYear(),now.getMonth()-6,1));
  else if(range==='1y')snaps=snaps.filter(s=>new Date(s.date)>=new Date(now.getFullYear()-1,now.getMonth(),1));
  if(!snaps.length)return'<div style="padding:24px;text-align:center;font-size:12px;color:var(--mu)">No snapshots in range</div>';
  const hdrs=snaps.map(s=>new Date(s.date).toLocaleDateString('en-US',{month:'short',year:'2-digit'}));
  const allAccts=[...new Set(snaps.flatMap(s=>Object.keys(s.accts||{})))];
  const hRow=`<tr style="background:var(--sf2)"><th style="text-align:left;padding:7px 12px;font-size:10px;color:var(--mu);font-weight:600">Account</th>${hdrs.map((h,i)=>`<th style="padding:7px 12px;font-size:10px;color:var(--mu);font-weight:600;text-align:right;white-space:nowrap">${h}${i>0?'<div style="font-size:9px;color:var(--di)">vs prev</div>':''}</th>`).join('')}</tr>`;
  const rows=allAccts.map(a=>`<tr><td style="padding:6px 12px;font-size:12px;font-weight:500">${a}</td>${snaps.map((s,si)=>{
    const val=s.accts?.[a]||0;const prev=si>0?snaps[si-1].accts?.[a]||0:null;
    const d=prev!==null?val-prev:null;
    return`<td style="padding:6px 12px;font-size:12px;text-align:right;font-family:var(--mo);color:${val?'var(--tx)':'var(--di)'}"><div>${val?fd(val):'—'}</div>${d!==null&&d!==0?`<div style="font-size:10px;color:${d>=0?'var(--sage-dark)':'var(--rose-dark)'}">${d>=0?'+':''}${fd(Math.abs(d))}</div>`:''}</td>`;
  }).join('')}</tr>`).join('');
  const totRow=`<tr style="border-top:1.5px solid var(--bd2)"><td style="padding:8px 12px;font-size:12px;font-weight:600;color:var(--sage-dark)">Net worth</td>${snaps.map((s,si)=>{
    const prev=si>0?snaps[si-1].net||0:null;const d=prev!==null?s.net-prev:null;
    return`<td style="padding:8px 12px;font-size:12px;text-align:right;font-family:var(--mo);font-weight:600;color:var(--sage-dark)"><div>${fd(s.net)}</div>${d&&d!==0?`<div style="font-size:10px;color:${d>=0?'var(--sage-dark)':'var(--rose-dark)'}">${d>=0?'+':''}${fd(Math.abs(d))}</div>`:''}</td>`;
  }).join('')}</tr>`;
  return`<table style="width:100%;border-collapse:collapse"><thead>${hRow}</thead><tbody>${rows}${totRow}</tbody></table>`;
}

function updateNWAcc(id,val){const a=S.nwAccounts.find(a=>a.id===id);if(a){a.value=val;persist();}}
function updateNWLiab(id,val){const l=S.nwLiabilities.find(l=>l.id===id);if(l){l.value=val;persist();}}
function deleteNWAcc(id){S.nwAccounts=S.nwAccounts.filter(a=>a.id!==id);persist();renderNetWorth();}
function deleteNWLiab(id){S.nwLiabilities=S.nwLiabilities.filter(l=>l.id!==id);persist();renderNetWorth();}
function addNWAcc(){
  const name=document.getElementById('new-acc-name')?.value?.trim();
  const type=document.getElementById('new-acc-type')?.value||'other';
  if(!name)return;
  S.nwAccounts.push({id:uid(),name,type,value:'0'});persist();renderNetWorth();
}
function addNWLiab(){
  const name=document.getElementById('new-liab-name')?.value?.trim();
  if(!name)return;
  S.nwLiabilities.push({id:uid(),name,value:'0'});persist();renderNetWorth();
}
function saveNWSnapshot(){
  const assets=S.nwAccounts.reduce((s,a)=>s+pc(a.value),0);
  const liabs=S.nwLiabilities.reduce((s,l)=>s+pc(l.value),0);
  const accts={};S.nwAccounts.forEach(a=>{accts[a.name]=pc(a.value);});
  const notes=document.getElementById('nwNotes')?.value||'';
  S.nwFields={notes};
  S.nwSnapshots.push({date:new Date().toISOString(),net:assets-liabs,assets,liabs,accts,notes});
  persist();renderNetWorth();drawWhenReady('nwChartCanvas','nwChartEmpty',S.nwSnapshots,window._nwRange||'all','#B8728A','rgba(184,114,138,0.15)');showToast('Snapshot saved!','ok');
}
function deleteNWSnap(i){S.nwSnapshots.splice(i,1);persist();renderNetWorth();showToast('Deleted','ok');}

function renderHistory(){
  const shell=document.getElementById('mainShell');
  const months=Object.keys(S.monthlyHistory).filter(k=>S.monthlyHistory[k]?.transactions?.length).sort().reverse();
  if(!months.length){
    shell.innerHTML=`<div style="padding-top:20px"><div class="empty-state" style="padding:60px 24px">
      <div class="empty-icon">📈</div>
      <div class="empty-title">History builds over time</div>
      <div class="empty-sub" style="margin-bottom:20px">Upload statements each month to see your spending trends here</div>
      <button class="nw-save-btn" onclick="switchTab('txn')" style="background:var(--rose)">Upload a statement</button>
    </div></div>`;
    return;
  }
  // Trend chart — last 6 months ascending
  const ascending=[...months].reverse().slice(-6);
  const actMap=Object.fromEntries(ascending.map(k=>([k,computeActuals(k)])));
  const spent=ascending.map(k=>actMap[k].varAct);
  const maxSpent=Math.max(...spent,1);
  const avgSpend=spent.reduce((s,v)=>s+v,0)/spent.length;
  const barH_area=56,barW=32,barGap=10;
  const svgW=ascending.length*(barW+barGap)-barGap;
  const bars=ascending.map((k,i)=>{
    const A=actMap[k];const h=Math.max(4,Math.round((A.varAct/maxSpent)*barH_area));
    const x=i*(barW+barGap);const y=barH_area-h;
    const isOver=A.delta<0;
    const lbl=k.replace(/^(\w{3})\w* (\d{4})$/,(_,m,yr)=>m+' '+yr.slice(2));
    return `<g><rect class="hist-bar-rect" x="${x}" y="${y}" width="${barW}" height="${h}" rx="3" fill="${isOver?'#B8728A':'#5A8A6A'}" opacity="${i===ascending.length-1?'0.85':'0.55'}" style="transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0);transition:transform .45s cubic-bezier(.34,1.2,.64,1) ${i*80}ms"/><text x="${x+barW/2}" y="${barH_area+13}" text-anchor="middle" font-size="9" fill="rgba(138,120,112,0.9)" font-family="DM Sans,sans-serif">${lbl}</text></g>`;
  }).join('');
  const trendChart=ascending.length>=2?`<div class="card" style="padding:16px 20px;margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
      <div style="font-size:13px;font-weight:600;color:var(--tx)">Spending trend</div>
      <div style="font-size:11px;color:var(--mu)">avg ${fd(avgSpend)}/mo · last ${ascending.length} months</div>
    </div>
    <svg width="100%" height="${barH_area+18}" viewBox="0 0 ${svgW} ${barH_area+18}" preserveAspectRatio="none" style="overflow:visible">${bars}</svg>
  </div>`:''
  const rows=months.map(key=>{
    const A=actMap[key]||computeActuals(key);
    const note=(S.monthlyHistory[key]||{}).note;
    return`<div class="hist-card" onclick="S.currentMonth=new Date('1 ${key}').toISOString();switchTab('txn')">
      <div>
        <div style="font-size:15px;font-weight:600">${key}</div>
        <div style="font-size:11px;color:var(--mu);margin-top:2px">${A.txns.length} transactions${note ? ' · "' + note.slice(0,50) + (note.length>50?'…':'') + '"' : ''}
        </div>
      </div>
      <div class="hist-right" style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div style="font-size:18px;font-weight:600">${fd(A.varAct)}</div>
        <span class="pill ${A.delta>=0?'badge-under':'badge-over'}">${A.delta>=0?fd(A.delta)+' under':fd(Math.abs(A.delta))+' over'}</span>
      </div>
    </div>`;
  }).join('');
  const hint=months.length<3?`<div style="font-size:12px;color:var(--di);text-align:center;margin-top:14px;padding-bottom:4px">More months will appear as you upload statements each month.</div>`:''
  shell.innerHTML=`<div style="padding-top:20px">
    <div style="font-size:20px;font-weight:600;margin-bottom:16px">Monthly history</div>
    ${trendChart}${rows}${hint}
  </div>`;
}

async function obCardFile(file){
  if(!file)return;
  const st=document.getElementById('ob-parse-st');
  const zone=document.getElementById('ob-drop-zone');
  if(st)st.textContent='⏳ Parsing…';
  try{
    const isCSV=/\.csv$/i.test(file.name);
    if(isCSV){
      const text=await file.text();
      const txns=text.split('\n').slice(1).filter(l=>l.trim()).map(l=>{
        const p=l.split(',');return{_id:uid(),date:(p[0]||'').replace(/"/g,''),merchant:(p[2]||p[1]||'').replace(/"/g,''),amount:Math.abs(parseFloat(p[4]||p[3]||0)),category:'Other'};
      }).filter(t=>t.amount>0);
      if(OB.pendingCard){OB.pendingCard.txns=txns;OB.pendingCard.txnCount=txns.length;}
      if(st){st.textContent=`✓ ${txns.length} transactions`;st.style.color='var(--sage-dark)';}
      if(zone)zone.classList.add('done');
      const fn=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
      const cn=document.getElementById('ob-cn');if(cn&&!cn.value)cn.value=fn;
      return;
    }
    const isImg=/\.(png|jpe?g|webp)$/i.test(file.name);
    const mime=isImg?(file.type||'image/png'):'application/pdf';
    const b64=await toB64(file);
    const _mv=document.getElementById('ob-stmt-month')?.value||new Date().toISOString().slice(0,7);
    const [_yr,_mo]=_mv.split('-');const _ms2=`${_mo}/01/${_yr.slice(-2)}`;
    const sys=`You are a JSON-only financial data extractor. Given any financial document or image, extract spending and output ONLY a valid JSON array — no markdown, no explanation.

Rules:
- Individual transactions → extract each charge with its actual date
- Category totals or summary table → one entry per row, category name as merchant, use "${_ms2}" as date
- Any other format with spending amounts → extract whatever you can find
- For entries with no visible date use "${_ms2}"
- Map each entry to the closest category from: Dining & food|Transport & gas|Shopping|Fitness|Health|Travel|Subscriptions|Personal care|Entertainment|Other
- Skip payments, refunds, credits, and balance transfers
- Return [] only if the image contains zero spending data

Format: [{"date":"MM/DD/YY","merchant":"name","amount":12.34,"category":"..."}]`;
    const resp=await fetch('/.netlify/functions/parse',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${_sbToken}`},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,system:sys,messages:[{role:'user',content:[{type:isImg?'image':'document',source:{type:'base64',media_type:mime,data:b64}},{type:'text',text:'Extract transactions as JSON array.'}]}]})});
    if(!resp.ok)throw new Error(`API ${resp.status}`);
    const data=await resp.json();
    let js=(data.content?.find(b=>b.type==='text')?.text||'[]').replace(/```json\n?|```/g,'').trim();
    const a=js.indexOf('['),z=js.lastIndexOf(']');if(a!==-1&&z>a)js=js.slice(a,z+1);
    const txns=JSON.parse(js).map(t=>({...t,_id:uid()}));
    if(OB.pendingCard){OB.pendingCard.txns=txns;OB.pendingCard.txnCount=txns.length;}
    if(st){st.textContent=`✓ ${txns.length} transactions parsed`;st.style.color='var(--sage-dark)';}
    if(zone)zone.classList.add('done');
    const cn=document.getElementById('ob-cn');
    if(cn&&!cn.value&&file.name)cn.value=file.name.replace(/[-_\.]?\d+.*$/,'').replace(/[-_]/g,' ').trim();
  }catch(e){
    if(st){st.textContent='✗ '+e.message;st.style.color='var(--rose-dark)';}
  }
}

function obAttachNWListeners(){
  // Checklist toggle
  document.querySelectorAll('.ob-nw-item[data-nwkey]').forEach(row=>{
    const key=row.dataset.nwkey;
    const check=row.querySelector('.ob-nw-check');
    const lbl=row.querySelector('.ob-nw-lbl');
    const inp=row.querySelector('.ob-nw-inp');
    const dash=row.querySelector('div[style*="—"]');
    function toggle(){
      if(OB.nwChecked.hasOwnProperty(key)){
        // Save current value then uncheck
        if(inp)OB.nwChecked[key]=inp.value;
        delete OB.nwChecked[key];
        if(check){check.classList.remove('on');check.textContent='';}
        if(inp)inp.style.display='none';
        if(dash)dash.style.display='block';
      } else {
        OB.nwChecked[key]='';
        if(check){check.classList.add('on');check.textContent='✓';}
        if(inp){inp.style.display='block';inp.focus();}
        if(dash)dash.style.display='none';
      }
    }
    check?.addEventListener('click',toggle);
    lbl?.addEventListener('click',toggle);
    // Save value on input
    inp?.addEventListener('input',()=>{if(OB.nwChecked.hasOwnProperty(key))OB.nwChecked[key]=inp.value;});
  });
  // Done / skip buttons
  document.getElementById('ob-nw-done-btn')?.addEventListener('click',obNWAdvance);
  document.getElementById('ob-nw-skip-btn')?.addEventListener('click',obNWAdvance);
}

function obToggleNW(key){
  // legacy — no longer used but kept for safety
  if(OB.nwChecked.hasOwnProperty(key))delete OB.nwChecked[key];
  else OB.nwChecked[key]='';
  renderOB();
}

function obFinish(){
  // Capture current NW input values from the DOM (if still on screen)
  document.querySelectorAll('.ob-nw-item[data-nwkey]').forEach(row=>{
    const key=row.dataset.nwkey;
    const inp=row.querySelector('.ob-nw-inp');
    if(inp&&OB.nwChecked.hasOwnProperty(key))OB.nwChecked[key]=inp.value||'0';
  });
  S.nwGoal=parseFloat(document.getElementById('ob-nwg')?.value)||1000000;
  // Commit cards
  S.cards=OB.cards.map(c=>({id:c.id,name:c.name,type:c.type,split:c.split||100,color:c.color,budgets:c.budgets||[]}));
  // Commit transactions — use each card's selected month
  OB.cards.forEach(c=>{
    const cardMonth=c.month||mk(new Date());
    if(!S.monthlyHistory[cardMonth])S.monthlyHistory[cardMonth]={transactions:[]};
    const existing=S.monthlyHistory[cardMonth].transactions.filter(t=>t.cardId!==c.id);
    S.monthlyHistory[cardMonth].transactions=[...existing,...(c.txns||[]).map(t=>({...t,cardId:c.id}))];
  });
  // Commit goals
  S.goals=OB.goals;
  // Commit NW accounts
  const typeMap={'investment':'investment','crypto':'crypto','cash':'cash'};
  Object.entries(OB.nwChecked).forEach(([k,val])=>{
    if(!val&&val!=='0')return;
    const parts=k.split('__');
    const type=typeMap[parts[0]]||'other';
    const name=parts[1]?.replace(/_/g,' ')||'Account';
    S.nwAccounts.push({id:uid(),name,type,value:val||'0'});
  });
  // Default fixed/savings
  if(!S.fixedItems.length)S.fixedItems=[{name:'Rent / mortgage',budget:0},{name:'Phone',budget:0},{name:'Utilities',budget:0}];
  if(!S.savingsItems.length)S.savingsItems=[{name:'Auto-save buffer',budget:0}];
  persist();completeOnboarding();
}

function obNWAdvance(){
  document.querySelectorAll('.ob-nw-item[data-nwkey]').forEach(row=>{
    const key=row.dataset.nwkey;
    const inp=row.querySelector('.ob-nw-inp');
    if(inp&&OB.nwChecked.hasOwnProperty(key))OB.nwChecked[key]=inp.value||'0';
  });
  S.nwGoal=parseFloat(document.getElementById('ob-nwg')?.value)||1000000;
  OB.pinStep=0;OB.pinFirst='';OB.pinEntered='';OB.pinErr='';
  OB.step=5;renderOB();
}

function obPin(prog){
  const entered=OB.pinEntered||'';
  const label=OB.pinStep===1?'Confirm your PIN':'Choose a 4-digit PIN';
  const nums=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  return`<div class="ob-logo">fin<span>a</span></div>${prog}
    <div class="ob-title">Set a PIN lock</div>
    <div class="ob-sub">Locks the app each time you open a new tab. Quick to unlock — keeps your finances private.</div>
    <div style="text-align:center;margin:28px 0 8px">
      <div style="font-size:13px;color:var(--mu);margin-bottom:20px">${label}</div>
      <div style="display:flex;justify-content:center;gap:14px;margin-bottom:8px">
        ${[0,1,2,3].map(i=>`<div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--bd2);background:${i<entered.length?'var(--rose)':'transparent'};transition:background .15s"></div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--rose);min-height:18px;margin-bottom:16px">${OB.pinErr||''}</div>
      <div style="display:grid;grid-template-columns:repeat(3,72px);gap:10px;justify-content:center">
        ${nums.map(n=>n===''?`<div></div>`:
          `<button onclick="obPinKey('${n}')" style="width:72px;height:72px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);font-size:${n==='⌫'?'18':'20'}px;font-weight:500;font-family:var(--fn);cursor:pointer;color:var(--tx)">${n}</button>`
        ).join('')}
      </div>
    </div>
    <button class="ob-btn-sec" onclick="OB.step=4;renderOB()">← Back</button>
    <div class="ob-skip" onclick="obFinish()">Skip — set PIN later from the menu</div>`;
}

function obPinKey(k){
  OB.pinErr='';
  let e=OB.pinEntered||'';
  if(k==='⌫'){e=e.slice(0,-1);}
  else if(e.length<4){e+=k;}
  OB.pinEntered=e;
  if(e.length===4){
    setTimeout(()=>{
      if(OB.pinStep===0){
        OB.pinFirst=e;OB.pinStep=1;OB.pinEntered='';renderOB();
      } else {
        if(e===OB.pinFirst){
          S.pin=e;obFinish();
        } else {
          OB.pinErr="PINs don't match — try again";
          OB.pinStep=0;OB.pinFirst='';OB.pinEntered='';renderOB();
        }
      }
    },120);
  } else {
    renderOB();
  }
}

function drawFinaChart(canvasId,emptyId,snapsAll,range,lineColor,fillColor){
  const canvas=document.getElementById(canvasId);const emptyEl=document.getElementById(emptyId);
  if(!snapsAll||!snapsAll.length){if(canvas){canvas.style.display='none';const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);}if(emptyEl)emptyEl.style.display='';return;}
  let snaps=[...snapsAll].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const now=new Date();
  if(range==='6m')snaps=snaps.filter(s=>new Date(s.date)>=new Date(now.getFullYear(),now.getMonth()-6,1));
  else if(range==='1y')snaps=snaps.filter(s=>new Date(s.date)>=new Date(now.getFullYear()-1,now.getMonth(),1));
  if(!snaps.length){if(canvas)canvas.style.display='none';if(emptyEl){emptyEl.style.display='';emptyEl.textContent='No snapshots in this range';}return;}
  if(canvas)canvas.style.display='block';if(emptyEl)emptyEl.style.display='none';
  const dpr=window.devicePixelRatio||1;
  if(canvas){const ctx0=canvas.getContext('2d');ctx0.clearRect(0,0,canvas.width,canvas.height);}
  const ownRect=canvas.getBoundingClientRect();
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=Math.max(ownRect.width>10?Math.floor(ownRect.width):(rect.width||canvas.parentElement.offsetWidth)-2,100);
  const H=Math.max(ownRect.height>10?Math.floor(ownRect.height):(parseInt(canvas.style.height)||120),80);
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const vals=snaps.map(s=>s.net);
  const dates=snaps.map(s=>new Date(s.date).getTime());
  const minV=Math.min(...vals)*0.98;const maxV=Math.max(...vals)*1.02;const rv=maxV-minV||1;
  const minD=Math.min(...dates),maxD=Math.max(...dates),rd=maxD-minD||1;
  const xpByDate=rd>1000; // only use date-based x if meaningful spread (>1 second)
  const pad={top:12,right:12,bottom:28,left:64};
  const pw=W-pad.left-pad.right;const ph=H-pad.top-pad.bottom;
  const xp=i=>xpByDate?pad.left+(dates[i]-minD)/rd*pw:pad.left+(i/(snaps.length-1||1))*pw;
  const yp=v=>pad.top+ph-(v-minV)/rv*ph;
  // Gridlines
  ctx.strokeStyle='rgba(44,36,32,0.06)';ctx.lineWidth=1;
  [0,.5,1].forEach(t=>{const yy=pad.top+ph*(1-t);ctx.beginPath();ctx.moveTo(pad.left,yy);ctx.lineTo(pad.left+pw,yy);ctx.stroke();ctx.fillStyle='rgba(138,120,112,0.8)';ctx.font=`10px DM Mono,monospace`;ctx.textAlign='right';ctx.fillText('$'+Math.round((minV+rv*t)/1000)+'k',pad.left-4,yy+3);});
  // Area fill
  if(snaps.length>1){
    const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+ph);
    grad.addColorStop(0,fillColor);grad.addColorStop(1,'rgba(240,235,230,0)');
    ctx.beginPath();ctx.moveTo(xp(0),yp(vals[0]));snaps.forEach((_,i)=>{if(i>0)ctx.lineTo(xp(i),yp(vals[i]));});ctx.lineTo(xp(snaps.length-1),pad.top+ph);ctx.lineTo(xp(0),pad.top+ph);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  }
  // Line
  ctx.beginPath();ctx.strokeStyle=lineColor;ctx.lineWidth=2;ctx.lineJoin='round';
  if(snaps.length===1){ctx.moveTo(pad.left,yp(vals[0]));ctx.lineTo(pad.left+pw,yp(vals[0]));}
  else snaps.forEach((_,i)=>{i===0?ctx.moveTo(xp(i),yp(vals[i])):ctx.lineTo(xp(i),yp(vals[i]));});
  ctx.stroke();
  // Dots
  snaps.forEach((_,i)=>{ctx.beginPath();ctx.arc(xp(i),yp(vals[i]),3.5,0,Math.PI*2);ctx.fillStyle=lineColor;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();});
  // X labels — pick up to 6, positioned by date
  ctx.fillStyle='rgba(138,120,112,0.8)';ctx.font='10px DM Sans,sans-serif';
  const labelStep=Math.max(1,Math.floor((snaps.length-1)/5));
  const labelIdxs=[];
  for(let i=0;i<snaps.length;i+=labelStep)labelIdxs.push(i);
  if(!labelIdxs.includes(snaps.length-1))labelIdxs.push(snaps.length-1);
  labelIdxs.forEach(i=>{
    const d=new Date(snaps[i].date);
    const lbl=d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    const x=xp(i);
    ctx.textAlign=i===0?'left':i===snaps.length-1?'right':'center';
    ctx.fillText(lbl,x,H-6);
  });
}


function drawWhenReady(canvasId,emptyId,snapsAll,range,lineColor,fillColor){
  // Use rAF to ensure DOM has painted before we measure
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const canvas=document.getElementById(canvasId);
      if(!canvas)return;
      const rect=canvas.getBoundingClientRect();
      if(rect.width>10){
        drawFinaChart(canvasId,emptyId,snapsAll,range,lineColor,fillColor);
        return;
      }
      // Canvas not visible yet — observe until it is
      const ro=new ResizeObserver(entries=>{
        for(const entry of entries){
          if(entry.contentRect.width>10){
            ro.disconnect();
            drawFinaChart(canvasId,emptyId,snapsAll,range,lineColor,fillColor);
            return;
          }
        }
      });
      ro.observe(canvas);
      setTimeout(()=>{ro.disconnect();drawFinaChart(canvasId,emptyId,snapsAll,range,lineColor,fillColor);},800);
    });
  });
}

});
